<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>registration gdgocs</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="site-header">
    <h1>GDGOC ITS - Hands On</h1>
  </header>

  <main class="container">
    <section class="card">
      <h2>About the Event</h2>
      <p>
        build a event registration form
      </p>
    </section>

    <section class="card">
      <h2>Topic Covered</h2>
      <ul>
        <li>HTML: basic structure and semantic elements</li>
        <li>CSS: selectors, layout, and styling</li>
        <li>JavaScript: DOM, events, function, and arrays</li>
      </ul>
    </section>

    <section class="card">
      <h2>Event Registration</h2>

      <form id="registration-form" class="form">
        <div class="form-group">
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="level">Experience Level</label>
          <select id="level" name="level">
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
          </select>
        </div>

        <div id="form-group form-group-inline">
          <label for="join-wa">
            <input id="join-wa" name="join-wa" type="checkbox" />
            Join Whatsapp Group
          </label>
        </div>


      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
